actions:
  verbs:
    - name: list
      description: Retrieve a collection of resources
      methods: [GET]
    - name: get
      description: Retrieve a single resource by identifier
      methods: [GET]
    - name: create
      description: Create or replace a resource
      methods: [PUT, POST]
    - name: update
      description: Partially update a resource
      methods: [PATCH]
    - name: delete
      description: Remove a resource
      methods: [DELETE]
    - name: check
      description: Validate resource constraints (e.g., name availability)
      methods: [POST]
    - name: backup
      description: Create a backup of a service
      methods: [POST]
    - name: restore
      description: Restore a service from backup
      methods: [POST]
    - name: apply
      description: Apply configuration changes
      methods: [POST]
    - name: migrate
      description: Migrate service to new platform version
      methods: [POST]
    - name: generate-token
      description: Generate an authentication token
      methods: [POST]
    - name: regenerate-key
      description: Regenerate a cryptographic key
      methods: [POST]
    - name: regenerate-primary-key
      description: Regenerate subscription primary key
      methods: [POST]
    - name: regenerate-secondary-key
      description: Regenerate subscription secondary key
      methods: [POST]
    - name: list-keys
      description: List gateway keys
      methods: [POST]
    - name: list-secrets
      description: List subscription secrets
      methods: [POST]
    - name: list-debug-credentials
      description: List debug credentials
      methods: [POST]
    - name: list-trace
      description: List gateway trace data
      methods: [POST]
    - name: invalidate
      description: Invalidate credentials
      methods: [POST]
    - name: reconnect
      description: Reconnect to a backend
      methods: [POST]
    - name: refresh
      description: Refresh secret from key vault
      methods: [POST]
    - name: assign
      description: Associate a tag with a resource
      methods: [PUT]
    - name: generate-sso
      description: Generate single sign-on URL
      methods: [POST]
    - name: get-token
      description: Get shared access token
      methods: [POST]

schemas:
