personas:
  - name: API Platform Admin
    description: Manages the full API lifecycle, products, policies, and platform configuration
    workflows:
      - api-lifecycle-management

  - name: API Developer
    description: Discovers, tests, and subscribes to APIs via the developer portal
    workflows:
      - developer-onboarding

  - name: DevOps Engineer
    description: Deploys, configures, and monitors cloud and self-hosted API gateways
    workflows:
      - gateway-operations

  - name: AI Engineer
    description: Manages AI backends, LLM deployments, and AI gateway capabilities
    workflows:
      - ai-gateway-management
