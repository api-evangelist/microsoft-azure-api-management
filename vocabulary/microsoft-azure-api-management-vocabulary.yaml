      - name: Diagnostic_Get
        verb: get
        method: GET
      - name: Diagnostic_CreateOrUpdate
        verb: create
        method: PUT
      - name: Diagnostic_Update
        verb: update
        method: PATCH
      - name: Diagnostic_Delete
        verb: delete
        method: DELETE
