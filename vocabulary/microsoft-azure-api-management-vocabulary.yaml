vocabulary:
  name: Microsoft Azure API Management
  version: "2024-05-01"
  generated: "2026-04-21"
  description: >-
    Vocabulary and taxonomy schema mapping operational (OpenAPI) and capability
    (Naftiko) dimensions for Azure API Management service.

apis:
  - name: Azure API Management AI Gateway
    namespace: azure-apim-ai-gateway
    version: "2024-05-01"
    baseUrl: https://{service-name}.azure-api.net
    status: active
    openapi: openapi/microsoft-azure-api-management-ai-gateway-openapi.yaml

  - name: Azure API Management Developer Portal
    namespace: azure-apim-dev-portal
    version: "2024-05-01"
    baseUrl: https://{service-name}.developer.azure-api.net
    status: active
    openapi: openapi/microsoft-azure-api-management-developer-portal-openapi.yaml

  - name: Azure API Management Gateway
    namespace: azure-apim-gateway
    version: "2024-05-01"
    baseUrl: https://{service-name}.azure-api.net
    status: active
    openapi: openapi/microsoft-azure-api-management-gateway-openapi.yaml

  - name: Azure API Management REST API
    namespace: azure-apim-rest
    version: "2024-05-01"
    baseUrl: https://management.azure.com
    status: active
    openapi: openapi/microsoft-azure-api-management-rest-api-openapi.yaml

  - name: Azure API Management Self-Hosted Gateway
    namespace: azure-apim-self-hosted-gw
    version: "2.6.0"
    baseUrl: https://{gateway-hostname}
    status: active
    openapi: openapi/microsoft-azure-api-management-self-hosted-gateway-openapi.yaml

domains:
  - name: AI Gateway
    description: AI/LLM proxy capabilities including chat completions, embeddings, and MCP
    resources:
      - chat-completions
      - completions
      - embeddings
      - mcp

  - name: API Lifecycle
    description: Full API lifecycle including versioning, revisions, releases, schemas, and operations
    resources:
      - api
      - api-operation
      - api-policy
      - api-version-set
      - api-release
      - api-revision
      - api-schema
      - api-diagnostic

  - name: Gateway Infrastructure
    description: Cloud and self-hosted gateway deployment, routing, and health
    resources:
      - gateway
      - gateway-api
      - gateway-certificate-authority
      - gateway-hostname-configuration
      - proxy
      - health

  - name: Products and Subscriptions
    description: API packaging, access control, and subscription key management
    resources:
      - product
      - product-api
      - product-policy
      - product-group
      - subscription

  - name: Developer Experience
    description: Developer portal, user management, and onboarding
    resources:
      - portal
      - apis
      - products
      - authentication
      - profile
      - user
      - group
      - group-user

  - name: Platform Administration
    description: Service instances, policies, backends, certificates, tags, named values, workspaces
    resources:
      - service
      - policy
      - backend
      - certificate
      - tag
      - named-value
      - workspace
      - diagnostic
      - logger

