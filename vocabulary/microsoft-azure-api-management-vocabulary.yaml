authentication:
  schemes:
    - name: azure_auth
      type: oauth2
      flow: implicit
      authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
      scopes:
        - user_impersonation
      apis:
        - azure-apim-rest

    - name: api-key
      type: apiKey
      in: header
      name: api-key
      apis:
        - azure-apim-ai-gateway

    - name: subscription-key
      type: apiKey
      in: header
      name: Ocp-Apim-Subscription-Key
      apis:
        - azure-apim-gateway
        - azure-apim-self-hosted-gw

workflows:
  - name: ai-gateway-management
    label: AI Gateway Management
    description: Manage AI backends and LLM deployments through Azure API Management
    capability: capabilities/ai-gateway-management.yaml
    shared: capabilities/shared/ai-gateway.yaml
    apis:
      - azure-apim-ai-gateway
      - azure-apim-rest
    toolCount: 25
    personas:
      - AI Engineer
    domains:
      - AI Gateway
      - API Lifecycle
      - Products and Subscriptions
      - Platform Administration
    resources:
      - chat-completions
      - completions
      - embeddings
      - mcp
      - api
      - api-policy
      - api-diagnostic
      - backend
      - logger
      - product
      - subscription

  - name: api-lifecycle-management
    label: API Lifecycle Management
    description: Manage full API lifecycle including versioning, policies, products, and subscriptions
    capability: capabilities/api-lifecycle-management.yaml
    shared: capabilities/shared/rest-api.yaml
    apis:
      - azure-apim-rest
    toolCount: 55
    personas:
      - API Platform Admin
    domains:
      - API Lifecycle
      - Products and Subscriptions
      - Platform Administration
    resources:
      - service
      - api
      - api-operation
      - api-policy
      - api-version-set
      - api-release
      - api-revision
      - api-schema
      - product
      - product-api
      - product-policy
      - subscription
      - policy
      - backend
      - certificate
      - tag
      - named-value
      - workspace

  - name: developer-onboarding
    label: Developer Onboarding
    description: Discover, test, and subscribe to APIs through the developer portal
    capability: capabilities/developer-onboarding.yaml
    shared: capabilities/shared/developer-portal.yaml
    apis:
      - azure-apim-dev-portal
      - azure-apim-rest
      - azure-apim-gateway
    toolCount: 27
    personas:
      - API Developer
    domains:
      - Developer Experience
      - Products and Subscriptions
      - Gateway Infrastructure
    resources:
      - portal
      - portal-apis
      - portal-products
      - portal-auth
      - portal-profile
      - user
      - group
      - group-user
      - subscription
      - product
      - product-group
      - proxy

  - name: gateway-operations
    label: Gateway Operations
    description: Deploy, configure, and monitor API gateways including self-hosted
    capability: capabilities/gateway-operations.yaml
    shared:
      - capabilities/shared/gateway.yaml
