naftiko: "1.0.0-alpha1"
info:
  label: Azure API Management REST API
  description: >-
    REST APIs for managing Azure API Management service instances and their
    entities including APIs, products, subscriptions, users, groups, policies,
    gateways, backends, certificates, and workspaces via Azure Resource Manager.
  tags:
    - API Management
    - Azure
    - Resource Manager
    - Platform Administration
  created: "2026-04-21"
  modified: "2026-04-21"
capability:
  consumes:
    - type: http
      namespace: azure-apim-rest
      baseUri: https://management.azure.com
      auth:
        type: oauth2
        scopes:
          - user_impersonation
      resources:
        - name: service
          label: API Management Service
          path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ApiManagement/service/{serviceName}
          operations:
            - name: ApiManagementService_List
              label: List Services
              method: GET
            - name: ApiManagementService_ListByResourceGroup
              label: List Services By Resource Group
              method: GET
            - name: ApiManagementService_Get
              label: Get Service
              method: GET
            - name: ApiManagementService_CreateOrUpdate
              label: Create Or Update Service
              method: PUT
            - name: ApiManagementService_Update
              label: Update Service
              method: PATCH
            - name: ApiManagementService_Delete
              label: Delete Service
              method: DELETE
            - name: ApiManagementService_Backup
              label: Backup Service
              method: POST
            - name: ApiManagementService_Restore
              label: Restore Service
              method: POST
            - name: ApiManagementService_CheckNameAvailability
              label: Check Name Availability
              method: POST
            - name: ApiManagementService_GetSsoToken
              label: Get SSO Token
              method: POST
            - name: ApiManagementService_MigrateToStv2
              label: Migrate To STv2
              method: POST
            - name: ApiManagementService_ApplyNetworkConfigurationUpdates
              label: Apply Network Configuration Updates
              method: POST
        - name: api
          label: APIs
          path: /subscriptions/{subscriptionId}/resourceGroups/{resourceGroupName}/providers/Microsoft.ApiManagement/service/{serviceName}/apis/{apiId}
          operations:
            - name: Api_ListByService
              label: List APIs
              method: GET
            - name: Api_Get
              label: Get API
              method: GET
            - name: Api_CreateOrUpdate
              label: Create Or Update API
              method: PUT
            - name: Api_Update
              label: Update API
              method: PATCH
            - name: Api_Delete
              label: Delete API
              method: DELETE
        - name: api-operation
