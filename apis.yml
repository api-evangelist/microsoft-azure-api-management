  - aid: microsoft-azure-api-management:azure-api-management-developer-portal
    name: Azure API Management Developer Portal
    description: >-
      The Azure API Management developer portal is an automatically generated,
      fully customizable website that allows API consumers to discover APIs,
      read documentation, test APIs through an interactive console, create
      accounts, subscribe to API products, and manage API keys. It can be
      self-hosted and extended with custom content and branding.
    humanURL: https://learn.microsoft.com/en-us/azure/api-management/api-management-howto-developer-portal-customize
