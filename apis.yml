  - aid: microsoft-azure-api-management:azure-api-management-ai-gateway
    name: Azure API Management AI Gateway
    description: >-
      The Azure API Management AI gateway is a set of capabilities for managing,
      securing, scaling, and observing AI backends including Microsoft Foundry
      and Azure OpenAI deployments, OpenAI-compatible LLM endpoints, MCP
      servers, and A2A agent APIs. It provides token rate limiting and quotas,
      semantic caching, load balancing across AI backends, content safety
      enforcement, and token usage observability through Application Insights.
    humanURL: https://learn.microsoft.com/en-us/azure/api-management/genai-gateway-capabilities
    baseURL: https://management.azure.com/
    tags:
