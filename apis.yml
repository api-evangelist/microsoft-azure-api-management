  - aid: microsoft-azure-api-management:azure-api-management-self-hosted-gateway
    name: Azure API Management Self-Hosted Gateway
    description: >-
      The Azure API Management self-hosted gateway is a containerized,
      Linux-based Docker image that can be deployed to Kubernetes, Docker, or
      any container orchestration platform in on-premises or other cloud
      environments. It federates with a cloud-based API Management instance for
      centralized configuration and management while routing API traffic locally
      to reduce latency and address compliance requirements.
    humanURL: https://learn.microsoft.com/en-us/azure/api-management/self-hosted-gateway-overview
