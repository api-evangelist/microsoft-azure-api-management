aid: microsoft-azure-api-management
name: Microsoft Azure API Management
description: >-
  Microsoft Azure API Management is a hybrid, multicloud management platform
  for APIs across all environments. It provides an API gateway, management
  plane, and developer portal supporting the complete API lifecycle including
  publishing, securing, monitoring, and transforming APIs for external, partner,
  and internal developers. It includes an AI gateway for governing LLM
  deployments, MCP servers, and agentic AI workloads.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI Gateway
  - API Gateway
  - API Management
  - Enterprise
  - Microsoft Azure
