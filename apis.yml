  - aid: microsoft-azure-api-management:azure-api-management-gateway
    name: Azure API Management Gateway
    description: >-
      The Azure API Management gateway (data plane) acts as a facade to backend
      services, routing API requests, enforcing policies, verifying credentials,
      applying rate limits and quotas, caching responses, and emitting telemetry.
      It supports managed cloud-hosted and self-hosted containerized deployments
      for hybrid and multicloud environments.
    humanURL: https://learn.microsoft.com/en-us/azure/api-management/api-management-key-concepts
    baseURL: https://azure-api.net
    tags:
      - API Gateway
      - Policies
      - Proxy
      - Traffic Management
    properties:
