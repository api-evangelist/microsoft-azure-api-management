apis:
  - aid: microsoft-azure-api-management:azure-api-management-rest-api
    name: Azure API Management REST API
    description: >-
      The Azure API Management REST API provides programmatic access to manage
      API Management service instances and their entities, including APIs,
      products, subscriptions, users, groups, policies, gateways, backends,
      certificates, and workspaces. It uses Azure Resource Manager conventions
      and supports API versions up to 2024-05-01 with over 100 operation groups
      covering the full management plane.
    humanURL: https://learn.microsoft.com/en-us/rest/api/apimanagement/
    baseURL: https://management.azure.com/
    tags:
      - Azure Resource Manager
      - Configuration
      - Management Plane
      - REST
