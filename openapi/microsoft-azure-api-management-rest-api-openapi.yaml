        id:
          type: string
          example: /subscriptions/a1b2c3d4-e5f6-7890-abcd-ef1234567890/resourceGroups/contoso-rg/providers/Microsoft.ApiManagement/service/contoso-apim/apis/petstore-api/diagnostics/applicationinsights
        name:
          type: string
          example: applicationinsights
        type:
          type: string
          example: Microsoft.ApiManagement/service/apis/diagnostics
        properties:
          type: object
          properties:
            loggerId:
