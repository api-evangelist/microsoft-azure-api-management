components:
  securitySchemes:
    azure_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://login.microsoftonline.com/common/oauth2/authorize
          scopes:
            user_impersonation: impersonate your user account
  schemas:
    OperationListResult:
      type: object
      properties:
        value:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                example: Microsoft.ApiManagement/service/read
              display:
                type: object
                properties:
                  provider:
                    type: string
                    example: Microsoft API Management
                  resource:
                    type: string
                    example: Service
                  operation:
                    type: string
                    example: Read API Management Service
        nextLink:
          type: string
          example: ''
    ServiceNameAvailabilityResult:
      type: object
      properties:
        nameAvailable:
          type: boolean
          example: true
        message:
          type: string
          example: ''
        reason:
          type: string
          example: ''
    DomainOwnershipIdentifierResult:
      type: object
      properties:
        domainOwnershipIdentifier:
          type: string
          example: abc123def456ghi789
    ApiManagementServiceListResult:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/ApiManagementServiceResource'
        count:
          type: integer
          example: 1
        nextLink:
          type: string
          example: ''
    ApiManagementServiceResource:
      type: object
      properties:
        id:
          type: string
          example: /subscriptions/a1b2c3d4-e5f6-7890-abcd-ef1234567890/resourceGroups/contoso-rg/providers/Microsoft.ApiManagement/service/contoso-apim
        name:
          type: string
          example: contoso-apim
        type:
          type: string
          example: Microsoft.ApiManagement/service
        location:
          type: string
          example: West US 2
        sku:
          type: object
          properties:
            name:
              type: string
              example: Developer
            capacity:
              type: integer
              example: 1
        properties:
          type: object
          properties:
            publisherEmail:
              type: string
              example: admin@contoso.com
            publisherName:
              type: string
              example: Contoso
            provisioningState:
              type: string
              example: Succeeded
            gatewayUrl:
              type: string
              example: https://contoso-apim.azure-api.net
            portalUrl:
              type: string
              example: https://contoso-apim.developer.azure-api.net
            managementApiUrl:
              type: string
              example: https://contoso-apim.management.azure-api.net
            createdAtUtc:
              type: string
              format: date-time
              example: '2024-01-10T08:00:00Z'
    ApiCollection:
      type: object
      properties:
        value:
          type: array
          items:
            $ref: '#/components/schemas/ApiContract'
        count:
          type: integer
          example: 2
        nextLink:
          type: string
          example: ''
    ApiContract:
      type: object
      properties:
        id:
          type: string
          example: /subscriptions/a1b2c3d4-e5f6-7890-abcd-ef1234567890/resourceGroups/contoso-rg/providers/Microsoft.ApiManagement/service/contoso-apim/apis/petstore-api
        name:
          type: string
          example: petstore-api
        type:
          type: string
          example: Microsoft.ApiManagement/service/apis
        properties:
          type: object
          properties:
            displayName:
              type: string
              example: Petstore API
            description:
              type: string
              example: A sample API for managing pets.
            serviceUrl:
              type: string
              example: https://petstore.example.com/v1
            path:
              type: string
              example: petstore
            protocols:
              type: array
              items:
                type: string
              example:
              - https
            subscriptionRequired:
              type: boolean
              example: true
            apiRevision:
              type: string
              example: '1'
    ApiCreateOrUpdateParameter:
      type: object
      properties:
        properties:
          type: object
          properties:
            displayName:
              type: string
              example: Petstore API
